name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: 553066146922.dkr.ecr.ap-south-1.amazonaws.com/devops-guinea-pig
  EKS_CLUSTER_NAME: devops-guinea-pig-eks

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }} .

      - name: Push image to ECR
        run: |
          docker push $ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Deploy with Helm
        run: |
          helm upgrade --install devops-guinea-pig ./helm/devops-guinea-pig \
            --namespace dev --create-namespace \
            --set image.tag=${{ steps.vars.outputs.IMAGE_TAG }}